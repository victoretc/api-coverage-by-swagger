{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<div class="form-wrap">
    <div class="form-card">
        <form id="urlForm" novalidate>
            <div class="form-group">
                <label for="base_url" class="form-label">Base URL</label>
                <input type="url" class="form-input" id="base_url" name="base_url" placeholder="http://127.0.0.1:8080" required>
            </div>
            <div class="form-group">
                <label for="swagger_url" class="form-label">JSON Schema URL</label>
                <input type="url" class="form-input" id="swagger_url" name="swagger_url" placeholder="http://127.0.0.1:8080/openapi.json" required>
            </div>
            <button type="submit" class="btn btn--primary btn--block mt-4">Сохранить</button>
            <div class="loader" id="loader"></div>
        </form>
    </div>
</div>

<div id="notify" class="notify" role="alert"></div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', path='/js/url_form.js') }}"></script>
{% endblock %}
