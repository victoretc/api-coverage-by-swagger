name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  test:
    runs-on: ubuntu-latest
                
    steps:
      - uses: actions/checkout@v4
      - name: Set up python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.44.0
      - name: install deps
        run: task install-deps
      - name: lint
        run: task lint
      - name: Test with pytest
        run: task test